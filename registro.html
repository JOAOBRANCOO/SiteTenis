<body>
    <header class="header">
        <div class="header-container">

            <a href="#">
                <h1 class="logo">
                    JOÃO BRANCO
                </h1>
            </a>
            <nav>
                <input type="checkbox" id="menu-hamburguer" />
                <label for="menu-hamburguer">
                    <div class="menu">
                        <span class="hamburguer"></span>
                    </div>
                </label>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="index.html#lancamentos">Produtos</a></li>

                    <li><a href="registro.html">Registro</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div id="main-registro">
            <form id="form">           
                <label for="name" class="label-regi">Digite seu nome:</label><br>
                <input type="text" id="name" class="input-regi"><br><br>

                <label for="email" class="label-regi">Digite seu e-mail:</label><br>
                <input type="email" id="email" placeholder="exemple@gmail.com" class="input-regi"><br><br>

                <label for="senha" class="label-regi">Digite sua senha:</label><br>
                <input type="password" id="senha" class="input-regi"><br><br>

                <label for="confirm_senha" class="label-regi">Confirme sua senha:</label><br>
                <input type="password" id="confirm_senha" class="input-regi"><br><br>
                
                <button type="button" class="limpar" onclick="limparCampos()">LIMPAR</button>
                <button type="button" class="submit" onclick="verifica(event)">REGISTRAR</button>
            </form>
        </div>
    </section>
    <div id="registro-principal">
        <div>
            <!-- Tabela de registros, inicialmente escondida -->
            <div id="registros" style="display: none;">
                <h2 id="h2-regi">Registros:</h2>
                <div id="tabela-container">
                    <table id="tabela-registros">
                        <!-- Adicione a coluna de nome na tabela -->
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>Email</th>
                                <th>Senha</th>
                            </tr>
                        </thead>

                        <tbody>
                            <!-- Registros serão adicionados aqui -->
                        </tbody>
                    </table>
                </div>
            </div>        
        </div>
    </div>
        <script src="script.js"></script>
    </div>
